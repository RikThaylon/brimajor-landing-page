<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brimajor — Carregando...</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Circuit grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg stroke='%23005DFF' stroke-width='0.3' stroke-opacity='0.07'%3E%3Cpath d='M30 0v60M0 30h60M15 0v60M45 0v60M0 15h60M0 45h60'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      background-size: 60px 60px;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* Spinning 3D ring */
    .ring-container {
      position: relative;
      width: 90px;
      height: 90px;
      perspective: 400px;
    }

    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
      animation: spin3d 1.8s linear infinite;
      will-change: transform;
    }

    .ring-1 {
      border-top-color: #0066FF;
      border-right-color: #0066FF30;
      animation-duration: 1.4s;
    }

    .ring-2 {
      inset: 12px;
      border-bottom-color: #0099FF;
      border-left-color: #0099FF30;
      animation-direction: reverse;
      animation-duration: 1.8s;
    }

    .ring-3 {
      inset: 24px;
      border-top-color: #0066FF80;
      animation-duration: 1s;
    }

    .dot {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #0066FF;
      box-shadow: 0 0 16px #0066FF, 0 0 32px #0066FF60;
      animation: glowPulse 1.5s ease-in-out infinite;
    }

    @keyframes spin3d {
      from { transform: rotate3d(0.5, 1, 0.2, 0deg); }
      to   { transform: rotate3d(0.5, 1, 0.2, 360deg); }
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 16px #0066FF, 0 0 32px #0066FF60; }
      50%       { opacity: 0.6; box-shadow: 0 0 8px #0066FF; }
    }

    .logo {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #fff;
    }

    .logo span { color: #0066FF; }

    /* Progress bar */
    .bar-wrap {
      width: 220px;
      height: 2px;
      background: #1a1a1a;
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #0033CC, #0099FF);
      border-radius: 99px;
      animation: loadBar 3.5s ease-in-out forwards;
      box-shadow: 0 0 8px #0066FF80;
    }

    @keyframes loadBar {
      0%   { width: 0%; }
      40%  { width: 65%; }
      70%  { width: 80%; }
      90%  { width: 92%; }
      100% { width: 100%; }
    }

    .status {
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      animation: textCycle 3.5s steps(1) forwards;
    }

    @keyframes textCycle {
      0%  { content: 'Inicializando servidor...'; }
    }

    .status::after {
      content: 'Inicializando servidor...';
      animation: textSwap 3.5s steps(1) forwards;
    }

    @keyframes textSwap {
      0%   { content: 'Inicializando servidor...'; }
      30%  { content: 'Carregando módulos...'; }
      60%  { content: 'Preparando interface...'; }
      90%  { content: 'Quase pronto...'; }
      100% { content: 'Pronto!'; }
    }

    /* Fade out whole screen when done */
    .wrap { animation: fadeIn 0.4s ease forwards; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      will-change: transform;
    }
    .orb-1 {
      width: 300px; height: 300px;
      background: rgba(0,102,255,0.07);
      top: 20%; left: 10%;
      animation: floatOrb 6s ease-in-out infinite;
    }
    .orb-2 {
      width: 200px; height: 200px;
      background: rgba(0,153,255,0.06);
      bottom: 20%; right: 10%;
      animation: floatOrb 8s ease-in-out infinite reverse;
    }
    @keyframes floatOrb {
      0%, 100% { transform: translate3d(0,0,0); }
      50%       { transform: translate3d(20px,-20px,0); }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="wrap">
    <div class="ring-container">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <div class="dot"></div>
    </div>

    <div class="logo">Bri<span>major</span></div>

    <div class="bar-wrap">
      <div class="bar-fill"></div>
    </div>

    <p class="status"></p>
  </div>

  <script>
    // Redirect to real site after Render wakes up (poll until OK)
    const TARGET = '/';
    let attempts = 0;

    async function checkReady() {
      try {
        const r = await fetch('/', { method: 'HEAD', cache: 'no-store' });
        if (r.ok) {
          window.location.replace(TARGET);
          return;
        }
      } catch (_) {}
      attempts++;
      // Retry every 2s, max 60 attempts (2 min)
      if (attempts < 60) setTimeout(checkReady, 2000);
    }

    // Start polling after 1s
    setTimeout(checkReady, 1000);
  </script>
</body>
</html>
